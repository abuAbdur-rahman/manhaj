<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Manhaj</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Geist Sans", system-ui, -apple-system, sans-serif;
        background: #fafaf7;
        color: #07200f;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .container {
        text-align: center;
        max-width: 400px;
      }

      h1 {
        color: #155732;
        font-size: 1.875rem;
        margin-bottom: 0.5rem;
        font-weight: 600;
      }

      p {
        color: #666;
        font-size: 1rem;
        margin-bottom: 1.5rem;
        line-height: 1.6;
      }

      .icon {
        font-size: 3rem;
        margin-bottom: 1rem;
      }

      a {
        display: inline-block;
        background: #1a6b3c;
        color: white;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        text-decoration: none;
        font-weight: 500;
        margin-top: 1rem;
        transition: background 0.2s;
      }

      a:hover {
        background: #155732;
      }

      .hint {
        margin-top: 2rem;
        padding: 1rem;
        background: #f0f7f4;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>You're Offline</h1>
      <p>You can still listen to lectures you've already downloaded.</p>
      <a href="/downloads">Go to Downloads</a>

      <div class="hint">
        <strong>Tip:</strong> Pre-download your favorite lectures when online so you can
        listen anytime.
      </div>
    </div>
  </body>
</html>
